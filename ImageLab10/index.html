<!DOCTYPE html>
<html>
<head>

</head>
<body>
  <a-scene>

    <a-sky src="Paris.jpg" radius="30"></a-sky>

    <a-cylinder position="-4 1.5 -3" radius="1" height="2" color="#0096FF"></a-cylinder>
    <a-sphere position="-4 2.5 -3" radius="1" color="#0096FF"></a-sphere>
    <a-cone position="3 0.5 -3" radius-bottom="0.45" radius-top="0" height="1.4" src="texture3.jpg" rotation="180 0 0" segments-radial="32"> </a-cone>
    <a-sphere position="3 1.35 -3" radius="0.46" color="#5C3317"></a-sphere>
    <a-sphere position="3 2.0 -3" radius="0.32" color="#5C3317"></a-sphere></a-scene>
